<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Minimappa 3D IRL</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>

  <style>
    :root {
      --size: 340px;
      --panel: rgba(7, 10, 14, .94);
      --accent: #7fa6ff;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #hud {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: var(--size);
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.78));
    }

    #radar {
      position: relative;
      width: var(--size);
      height: var(--size);
      overflow: hidden;
      border-radius: 50%;
      border: 7px solid rgba(8,10,14,.98);
      background: #11161c;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.16),
        inset 0 0 35px rgba(0,0,0,.24);
    }

    #map {
      position: absolute;
      inset: -25px;
    }

    .maplibregl-control-container,
    .maplibregl-ctrl-logo {
      display: none !important;
    }

    #shade {
      position: absolute;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      border-radius: 50%;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,.04) 0%,
          rgba(0,0,0,.06) 55%,
          rgba(0,0,0,.32) 100%
        );
      box-shadow:
        inset 0 0 22px rgba(0,0,0,.22),
        inset 0 0 58px rgba(0,0,0,.46);
    }

    #north {
      position: absolute;
      top: 12px;
      left: 50%;
      z-index: 80;
      transform: translateX(-50%);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .8px;
      text-shadow: 0 2px 4px #000;
    }

    #status {
      position: absolute;
      right: 23px;
      top: 23px;
      z-index: 80;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #eab308;
      border: 2px solid rgba(0,0,0,.82);
    }

    #vehicle-scene {
      position: absolute;
      left: 50%;
      top: 58%;
      z-index: 90;
      width: 78px;
      height: 122px;
      transform:
        translate(-50%, -50%)
        perspective(230px)
        rotateX(24deg);
      transform-origin: 50% 62%;
      pointer-events: none;
      filter: drop-shadow(0 9px 6px rgba(0,0,0,.8));
    }

    #headlight {
      position: absolute;
      left: 50%;
      top: -52px;
      width: 106px;
      height: 82px;
      transform: translateX(-50%);
      clip-path: polygon(29% 100%, 71% 100%, 100% 0, 0 0);
      background:
        radial-gradient(
          ellipse at bottom,
          rgba(255,248,205,.46) 0%,
          rgba(255,248,205,.18) 46%,
          rgba(255,248,205,0) 76%
        );
      opacity: .72;
    }

    #vehicle-scene svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #info {
      position: relative;
      z-index: 100;
      width: calc(var(--size) - 12px);
      margin: -26px auto 0;
      padding: 10px 12px 9px;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(18,22,29,.98), rgba(7,9,13,.98));
      border-left: 5px solid var(--accent);
      border-radius: 3px 10px 10px 3px;
      box-shadow: 0 8px 18px rgba(0,0,0,.5);
      text-shadow: 0 2px 2px #000;
    }

    #road {
      font-size: 18px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 7px;
      margin-top: 6px;
      font-size: 14px;
      font-weight: 800;
    }

    .pill {
      padding: 3px 7px;
      border-radius: 5px;
      background: rgba(255,255,255,.075);
      border: 1px solid rgba(255,255,255,.1);
      white-space: nowrap;
    }

    #weather {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #accuracy {
      margin-top: 5px;
      font-size: 10px;
      opacity: .72;
    }

    #fallback {
      position: absolute;
      inset: 0;
      z-index: 95;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 25px;
      text-align: center;
      color: #fff;
      background: rgba(5,7,10,.92);
      font-size: 14px;
      font-weight: 700;
    }

    #permission {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      background: rgba(0,0,0,.84);
      padding: 20px;
    }

    #permission-card {
      width: min(410px,92vw);
      padding: 20px;
      border-radius: 14px;
      color: #fff;
      text-align: center;
      background: #16191f;
    }

    #permission button {
      margin-top: 14px;
      padding: 11px 17px;
      border: 0;
      border-radius: 9px;
      font-size: 16px;
      font-weight: 900;
    }

    @media(max-width:480px) {
      :root { --size: 295px; }
      #hud { left: 12px; bottom: 12px; }
      #vehicle-scene { width: 68px; height: 106px; }
    }
  </style>
</head>

<body>
  <div id="hud">
    <div id="radar">
      <div id="map"></div>
      <div id="north">N</div>
      <div id="status"></div>

      <div id="vehicle-scene">
        <div id="headlight"></div>

        <svg viewBox="0 0 78 120" aria-hidden="true">
          <defs>
            <linearGradient id="carBody" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#fff"/>
              <stop offset=".35" stop-color="#f7f7f7"/>
              <stop offset=".72" stop-color="#d7dbe0"/>
              <stop offset="1" stop-color="#aeb4bb"/>
            </linearGradient>

            <linearGradient id="carGlass" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#82909d"/>
              <stop offset=".45" stop-color="#35424d"/>
              <stop offset="1" stop-color="#0e151b"/>
            </linearGradient>

            <linearGradient id="roofShade" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#fff"/>
              <stop offset="1" stop-color="#c9cdd2"/>
            </linearGradient>
          </defs>

          <ellipse cx="39" cy="64" rx="28" ry="49" fill="rgba(0,0,0,.38)"/>

          <rect x="5" y="22" width="8" height="25" rx="3.5" fill="#080a0d"/>
          <rect x="65" y="22" width="8" height="25" rx="3.5" fill="#080a0d"/>
          <rect x="5" y="73" width="8" height="25" rx="3.5" fill="#080a0d"/>
          <rect x="65" y="73" width="8" height="25" rx="3.5" fill="#080a0d"/>

          <path
            d="M24 4
               Q39 -1 54 4
               L63 18
               Q69 31 68 51
               L68 69
               Q69 89 61 105
               Q51 116 39 118
               Q27 116 17 105
               Q9 89 10 69
               L10 51
               Q9 31 15 18 Z"
            fill="url(#carBody)"
            stroke="#171b20"
            stroke-width="2.6"
          />

          <path d="M21 8 Q39 1 57 8 L61 24 L17 24 Z"
                fill="#fbfbfb"
                stroke="#aeb3b9"
                stroke-width="1.2"/>

          <path d="M18 28 L60 28 L55 46 L23 46 Z"
                fill="url(#carGlass)"
                stroke="#0b1116"
                stroke-width="1.8"/>

          <rect x="20" y="47" width="38" height="34" rx="7"
                fill="url(#roofShade)"
                stroke="#abb0b6"
                stroke-width="1.3"/>

          <rect x="27" y="51" width="24" height="24" rx="5"
                fill="#1a242d"
                stroke="#080d12"
                stroke-width="1.5"/>

          <path d="M23 84 L55 84 L60 103 Q39 110 18 103 Z"
                fill="url(#carGlass)"
                stroke="#0b1116"
                stroke-width="1.8"/>

          <path d="M18 12 Q23 8 30 8 L28 13 Q22 15 18 16 Z" fill="#fff8cc"/>
          <path d="M60 12 Q55 8 48 8 L50 13 Q56 15 60 16 Z" fill="#fff8cc"/>

          <path d="M16 97 Q21 101 28 102 L27 107 Q20 106 16 103 Z" fill="#e51d2a"/>
          <path d="M62 97 Q57 101 50 102 L51 107 Q58 106 62 103 Z" fill="#e51d2a"/>

          <rect x="8" y="34" width="8" height="5" rx="2.5"
                fill="#eceeef" stroke="#6f757b"/>
          <rect x="62" y="34" width="8" height="5" rx="2.5"
                fill="#eceeef" stroke="#6f757b"/>
        </svg>
      </div>

      <div id="shade"></div>
      <div id="fallback">La visualizzazione 3D richiede WebGL.</div>
    </div>

    <div id="info">
      <div id="road">RICERCA POSIZIONE…</div>

      <div id="stats">
        <span id="speed" class="pill">0 km/h</span>
        <span id="heading" class="pill">0°</span>
        <span id="weather" class="pill">
          <span id="weather-icon">🌡️</span>
          <span id="temperature">--°C</span>
        </span>
      </div>

      <div id="accuracy">GPS in attesa</div>
    </div>
  </div>

  <div id="permission">
    <div id="permission-card">
      <strong>Consenti la posizione</strong>
      <div style="margin-top:8px;opacity:.82">
        La minimappa necessita del GPS del telefono.
      </div>
      <button id="permission-button">ATTIVA GPS</button>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const DEFAULT = { lat: 41.9028, lng: 12.4964 };
      const ZOOM = 16.8;
      const PITCH = 58;
      const ADDRESS_UPDATE_MS = 9000;
      const WEATHER_UPDATE_MS = 5 * 60 * 1000;

      const roadEl = document.getElementById("road");
      const speedEl = document.getElementById("speed");
      const headingEl = document.getElementById("heading");
      const accuracyEl = document.getElementById("accuracy");
      const statusEl = document.getElementById("status");
      const permissionEl = document.getElementById("permission");
      const permissionButton = document.getElementById("permission-button");
      const temperatureEl = document.getElementById("temperature");
      const weatherIconEl = document.getElementById("weather-icon");
      const fallbackEl = document.getElementById("fallback");

      if (!window.maplibregl || !maplibregl.supported()) {
        fallbackEl.style.display = "flex";
        roadEl.textContent = "3D NON SUPPORTATO";
        return;
      }

      const map = new maplibregl.Map({
        container: "map",
        style: "https://tiles.openfreemap.org/styles/liberty",
        center: [DEFAULT.lng, DEFAULT.lat],
        zoom: ZOOM,
        pitch: PITCH,
        bearing: 0,
        attributionControl: false,
        interactive: false,
        fadeDuration: 250,
        canvasContextAttributes: {
          antialias: true,
          preserveDrawingBuffer: false
        }
      });

      let currentHeading = 0;
      let lastAddressAt = 0;
      let lastWeatherAt = 0;
      let reverseAbort = null;
      let weatherAbort = null;

      map.on("load", () => {
        try {
          const layers = map.getStyle().layers || [];
          let labelLayerId;

          for (const layer of layers) {
            if (
              layer.type === "symbol" &&
              layer.layout &&
              layer.layout["text-field"]
            ) {
              labelLayerId = layer.id;
              break;
            }
          }

          if (!map.getSource("openfreemap-buildings")) {
            map.addSource("openfreemap-buildings", {
              url: "https://tiles.openfreemap.org/planet",
              type: "vector"
            });
          }

          map.addLayer(
            {
              id: "3d-buildings",
              source: "openfreemap-buildings",
              "source-layer": "building",
              type: "fill-extrusion",
              minzoom: 15,
              filter: ["!=", ["get", "hide_3d"], true],
              paint: {
                "fill-extrusion-color": [
                  "interpolate",
                  ["linear"],
                  ["coalesce", ["get", "render_height"], 0],
                  0, "#4d5660",
                  60, "#59636e",
                  180, "#66717d"
                ],
                "fill-extrusion-height": [
                  "interpolate",
                  ["linear"],
                  ["zoom"],
                  15, 0,
                  16, ["coalesce", ["get", "render_height"], 8]
                ],
                "fill-extrusion-base": [
                  "coalesce",
                  ["get", "render_min_height"],
                  0
                ],
                "fill-extrusion-opacity": .82
              }
            },
            labelLayerId
          );
        } catch (error) {
          console.warn("Edifici 3D non disponibili:", error);
        }

        map.resize();
      });

      map.on("error", (event) => {
        console.warn("Errore mappa:", event.error);
      });

      function normalizeHeading(value) {
        let heading = Number(value);
        if (!Number.isFinite(heading)) return currentHeading;

        heading %= 360;
        if (heading < 0) heading += 360;

        return heading;
      }

      function setNavigationCamera(lng, lat, heading, speedKmh) {
        currentHeading = normalizeHeading(heading);

        const zoom =
          speedKmh >= 80 ? 15.7 :
          speedKmh >= 45 ? 16.1 :
          speedKmh >= 15 ? 16.5 :
          ZOOM;

        map.easeTo({
          center: [lng, lat],
          bearing: currentHeading,
          pitch: PITCH,
          zoom,
          duration: 650,
          easing: t => t * (2 - t)
        });

        headingEl.textContent = `${Math.round(currentHeading)}°`;
      }

      function weatherEmoji(code, isDay) {
        if (code === 0) return isDay ? "☀️" : "🌙";
        if ([1,2].includes(code)) return isDay ? "🌤️" : "☁️";
        if (code === 3) return "☁️";
        if ([45,48].includes(code)) return "🌫️";
        if ([51,53,55,56,57].includes(code)) return "🌦️";
        if ([61,63,65,66,67,80,81,82].includes(code)) return "🌧️";
        if ([71,73,75,77,85,86].includes(code)) return "🌨️";
        if ([95,96,99].includes(code)) return "⛈️";
        return "🌡️";
      }

      async function updateWeather(lat, lng) {
        const now = Date.now();
        if (now - lastWeatherAt < WEATHER_UPDATE_MS) return;
        lastWeatherAt = now;

        if (weatherAbort) weatherAbort.abort();
        weatherAbort = new AbortController();

        try {
          const url =
            "https://api.open-meteo.com/v1/forecast" +
            `?latitude=${encodeURIComponent(lat)}` +
            `&longitude=${encodeURIComponent(lng)}` +
            "&current=temperature_2m,weather_code,is_day" +
            "&temperature_unit=celsius&timezone=auto";

          const response = await fetch(url, {
            signal: weatherAbort.signal
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const data = await response.json();
          const current = data.current || {};
          const temperature = Number(current.temperature_2m);
          const code = Number(current.weather_code);
          const isDay = Number(current.is_day) === 1;

          temperatureEl.textContent =
            Number.isFinite(temperature)
              ? `${Math.round(temperature)}°C`
              : "--°C";

          weatherIconEl.textContent = weatherEmoji(code, isDay);
        } catch (error) {
          if (error.name !== "AbortError") {
            temperatureEl.textContent = "--°C";
            weatherIconEl.textContent = "🌡️";
          }
        }
      }

      async function reverseGeocode(lat, lng) {
        const now = Date.now();
        if (now - lastAddressAt < ADDRESS_UPDATE_MS) return;
        lastAddressAt = now;

        if (reverseAbort) reverseAbort.abort();
        reverseAbort = new AbortController();

        try {
          const url =
            "https://nominatim.openstreetmap.org/reverse?format=jsonv2" +
            `&lat=${encodeURIComponent(lat)}` +
            `&lon=${encodeURIComponent(lng)}` +
            "&zoom=18&addressdetails=1";

          const response = await fetch(url, {
            signal: reverseAbort.signal,
            headers: { "Accept-Language": "it" }
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const data = await response.json();
          const a = data.address || {};

          const street =
            a.road ||
            a.pedestrian ||
            a.footway ||
            a.path ||
            a.neighbourhood ||
            a.suburb ||
            a.city_district ||
            a.village ||
            a.town ||
            a.city ||
            "POSIZIONE ATTUALE";

          const number = a.house_number ? ` ${a.house_number}` : "";
          roadEl.textContent = `${street}${number}`;
        } catch (error) {
          if (error.name !== "AbortError") {
            roadEl.textContent = "POSIZIONE ATTUALE";
          }
        }
      }

      function onPosition(position) {
        const c = position.coords;

        const speedKmh =
          Number.isFinite(c.speed) && c.speed >= 0
            ? Math.round(c.speed * 3.6)
            : 0;

        speedEl.textContent = `${speedKmh} km/h`;
        accuracyEl.textContent =
          `Precisione GPS ±${Math.round(c.accuracy || 0)} m`;

        const heading =
          Number.isFinite(c.heading) && c.heading >= 0 && speedKmh >= 2
            ? c.heading
            : currentHeading;

        setNavigationCamera(
          c.longitude,
          c.latitude,
          heading,
          speedKmh
        );

        statusEl.style.background = "#37d66b";
        permissionEl.style.display = "none";

        reverseGeocode(c.latitude, c.longitude);
        updateWeather(c.latitude, c.longitude);
      }

      function onPositionError(error) {
        statusEl.style.background = "#ef4b4b";

        accuracyEl.textContent =
          error.code === 1
            ? "Permesso GPS non concesso"
            : "Segnale GPS non disponibile";

        if (error.code === 1) {
          permissionEl.style.display = "flex";
        }
      }

      function startTracking() {
        if (!("geolocation" in navigator)) {
          roadEl.textContent = "GPS NON SUPPORTATO";
          accuracyEl.textContent = "WebView senza geolocalizzazione";
          statusEl.style.background = "#ef4b4b";
          return;
        }

        navigator.geolocation.watchPosition(
          onPosition,
          onPositionError,
          {
            enableHighAccuracy: true,
            maximumAge: 500,
            timeout: 15000
          }
        );
      }

      permissionButton.addEventListener("click", () => {
        permissionEl.style.display = "none";
        startTracking();
      });

      window.addEventListener("load", () => {
        [100, 350, 900, 1600].forEach(ms => {
          setTimeout(() => map.resize(), ms);
        });

        startTracking();
      });

      window.addEventListener("resize", () => {
        clearTimeout(window.__mapResize);
        window.__mapResize = setTimeout(() => map.resize(), 130);
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          [50, 300, 800].forEach(ms => {
            setTimeout(() => map.resize(), ms);
          });
        }
      });
    })();
  </script>
</body>
</html>
